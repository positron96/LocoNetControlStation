; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = lolin32

[env]
build_unflags = -std=gnu++2a -std=gnu++2b -Werror=reorder
build_flags =
    -std=gnu++20
    -mtext-section-literals
build_src_flags =
    -Wall
    -Werror

[env:lolin32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = lolin32
framework = arduino

lib_deps =
    EEPROM
    etlcpp/Embedded Template Library @ ^20.47
    tzapu/WiFiManager @ ^2.0.17
    https://github.com/positron96/AsyncTCP.git#features/keepalive
    https://github.com/mrrwa/LocoNet2.git#dcfad32


; PIO seems to select port automatically.
;upload_port = COM8
;monitor_port = COM8

monitor_filters = esp32_exception_decoder
monitor_speed = 115200

[env:native]
platform = native
;lib_ignore =
;build_flags = -Ilib/DCC

;test_src_filter =
    ;+<../lib/DCC/LocoAddress.cpp>
